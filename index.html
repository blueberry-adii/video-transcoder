<!DOCTYPE html>
<html>

<head>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body {
            background: #111;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .vjs-quality-selector .vjs-menu-button {
            margin-top: 0.2em;
        }
    </style>
</head>

<body>

    <video id="video-player" class="video-js vjs-default-skin vjs-big-play-centered" controls width="854" height="480">
        // Source Link for .m3u8 file for HLS Streaming
        <source src="https://result-blueberry.s3.us-east-1.amazonaws.com/processed/test/master.m3u8"
            type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script
        src="https://unpkg.com/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>

    <script
        src="https://unpkg.com/videojs-hls-quality-selector@2.0.0/dist/videojs-hls-quality-selector.min.js"></script>

    <script>
        var player = videojs('video-player');

        // This links the UI to the names in your master.m3u8
        player.hlsQualitySelector({
            displayCurrentQuality: true,
        });

        // DEBUG: Check your console (F12) to see if the player is reading your names
        player.ready(function () {
            var qualityLevels = player.qualityLevels();
            qualityLevels.on('addqualitylevel', function (event) {
                console.log('Detected quality level:', event.qualityLevel.id, 'Label:', event.qualityLevel.label);
            });
        });
    </script>
</body>

</html>
